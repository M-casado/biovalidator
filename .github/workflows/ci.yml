# CI workflow: runs tests on PRs to main/dev, pushes to main, or manual dispatch
  # Runs npm tests to ensure code quality
name: CI - Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to run the workflow on (e.g. dev)'
        required: false
        default: 'dev'

jobs:
  test:
    name: Run tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        node-version: ['24.13.0', '10.19.0']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }} 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Debug: show Node & npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --silent
        env:
          CI: true
